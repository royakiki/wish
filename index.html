<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whish Pay - Roy Akiki</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-[420px] border-t-[10px] border-[#E62946]">
    
    <div class="text-center mb-10">
      <img src="https://whish.money/invoice/whish.png" class="h-10 mx-auto mb-4" alt="Whish">
      <h2 class="text-xl font-bold text-gray-800">Payment to Roy Akiki</h2>
      <p class="text-gray-400 text-[10px] uppercase tracking-widest mt-2">Verified Payment Portal</p>
    </div>

    <form action="https://whish.money/invoice/pay/?q=RlIvBtlni" method="POST">
      
      <div class="space-y-6">
        <div>
          <label class="block text-[11px] font-bold text-gray-500 uppercase mb-2 ml-1">Your Whish Number</label>
          <input type="tel" name="phoneNumber" placeholder="70 123 456" required 
                 class="w-full border-2 border-gray-50 bg-gray-50 rounded-2xl p-4 focus:bg-white focus:border-[#E62946] outline-none transition-all">
        </div>

        <div>
          <label class="block text-[11px] font-bold text-gray-500 uppercase mb-2 ml-1">Amount (USD)</label>
          <div class="relative">
             <span class="absolute left-4 top-4 text-gray-400 font-bold">$</span>
             <input type="number" name="amount" placeholder="0.00" step="0.01" required 
                    class="w-full border-2 border-gray-50 bg-gray-50 rounded-2xl p-4 pl-8 focus:bg-white focus:border-[#E62946] outline-none transition-all">
          </div>
        </div>

        <button type="submit" class="w-full bg-[#E62946] text-white font-bold py-5 rounded-full shadow-lg shadow-red-100 hover:brightness-110 active:scale-95 transition-all mt-4">
          Open Whish App
        </button>
      </div>

      <div class="mt-10 pt-6 border-t border-gray-100 text-center">
        <div class="flex justify-center gap-6">
          <a href="https://whish.money/download" target="_blank" class="text-[10px] font-bold text-[#E62946] uppercase tracking-tighter">Get Whish</a>
          <span class="text-gray-200">|</span>
          <a href="https://whish.money/locations" target="_blank" class="text-[10px] font-bold text-gray-500 uppercase tracking-tighter">Find Agent</a>
        </div>
      </div>
    </form>
  </div>

</body>
</html>
