<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whish Pay - Roy Akiki</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-[420px] border-t-[10px] border-[#E62946]">
    
    <div class="text-center mb-10">
      <img src="https://whish.money/invoice/whish.png" class="h-10 mx-auto mb-4" alt="Whish">
      <h2 class="text-xl font-bold text-gray-800">Payment to Roy Akiki</h2>
      <p class="text-gray-400 text-[10px] uppercase tracking-widest mt-2 font-bold">Secure Transfer</p>
    </div>

    <div class="space-y-6">
      <div>
        <label class="block text-[11px] font-bold text-gray-500 uppercase mb-2 ml-1">Amount to Transfer (USD)</label>
        <div class="relative">
           <span class="absolute left-4 top-4 text-gray-400 font-bold">$</span>
           <input type="number" id="amount" placeholder="0.00" step="0.01" 
                  class="w-full border-2 border-gray-100 bg-gray-50 rounded-2xl p-4 pl-8 focus:bg-white focus:border-[#E62946] outline-none transition-all">
        </div>
      </div>

      <button onclick="redirectToWhish()" class="w-full bg-[#E62946] text-white font-bold py-5 rounded-full shadow-lg shadow-red-100 hover:brightness-110 active:scale-95 transition-all mt-4">
        Open Whish App
      </button>
    </div>

    <div class="mt-10 pt-6 border-t border-gray-100 flex items-center justify-center gap-2 text-green-600 opacity-60">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      <span class="text-[10px] font-bold uppercase tracking-widest">Secured by Whish Pay</span>
    </div>
  </div>

  <script>
    function redirectToWhish() {
      const amount = document.getElementById('amount').value;
      if (!amount || amount <= 0) {
        alert("Please enter a valid amount");
        return;
      }

      // We build the link dynamically. 
      // q=RlIvBtlni is your unique code.
      const whishUrl = "https://whish.money/invoice/pay/?q=RlIvBtlni&amount=" + amount;
      
      // This will either open the Whish App (on mobile) or the Whish Web Pay (on desktop)
      window.location.href = whishUrl;
    }
  </script>

</body>
</html>
